<header class="app-header">
  <div class="header-content">
    <div class="header-main">
      <div class="title-section">
        <h1>XSD Schema Viewer</h1>
      </div>

      <div class="file-input-section">
        <input class="file-input" type="file" accept=".xsd" multiple (change)="onFileChange($event)" />
      </div>
    </div>

    @if (cachedFileNames().length > 0) {
      <div class="file-chip-list">
        @for (fileName of cachedFileNames(); track fileName) {
          <div class="file-chip">
            <span class="file-chip-name">{{ fileName }}</span>

            <button class="file-chip-remove" type="button" (click)="onRemoveFile(fileName)">
              Remove
            </button>
          </div>
        }
      </div>
    }

  </div>
</header>

@if (errorMessage()) {
  <div class="app-shell">
    <div class="error-message">{{ errorMessage() }}</div>
  </div>
}

<div class="app-shell">

  <app-xsd-handbook />
  <app-schema-tree
    [fileGroups]="fileGroups()"
    (fileRemove)="onRemoveFile($event)"
  />

  <app-xml-handbook />
  <app-example-xml-panel
    [rootFileOptions]="rootFileOptions()"
    [selectedRootFile]="selectedRootFile()"
    [rootOptions]="rootOptions()"
    [selectedRoot]="selectedRoot()"
    [exampleXml]="exampleXml()"
    [generationMode]="exampleXmlGenerationMode()"
    (selectedRootFileChange)="onRootFileSelectionChange($event)"
    (selectedRootChange)="onRootSelectionChange($event)"
    (generationModeChange)="onExampleXmlGenerationModeChange($event)"
  />
  <app-example-json-panel [exampleXml]="exampleXml()" />
</div>

@if (isLoading()) {
  <div class="loader">
    <div class="loader-content">
      <div class="spinner"></div>
      <div>Processing files...</div>
    </div>
  </div>
}
