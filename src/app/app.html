<header class="app-header">
  <div class="header-content">
    <div class="header-main">
      <div class="title-section">
        <h1><a class="title-link" routerLink="/files">XML Workshop</a></h1>
      </div>

      @if (!isHandbookRoute()) {
        <div class="file-input-section">
          <input class="file-input" type="file" accept=".xsd" multiple (change)="workspace.onFileChange($event)" />
        </div>
      }
    </div>
    <nav class="header-nav" aria-label="Primary">
      <a class="header-nav-link" routerLink="/files" routerLinkActive="active">
        Files
      </a>
      <a class="header-nav-link" routerLink="/composer" routerLinkActive="active">
        XML Composer
      </a>
      <a class="header-nav-link" routerLink="/handbooks/xsd" routerLinkActive="active">
        XSD Handbook
      </a>
      <a class="header-nav-link" routerLink="/handbooks/xml" routerLinkActive="active">
        XML Handbook
      </a>
    </nav>
  </div>
</header>

@if (workspace.errorMessage()) {
  <div class="app-shell">
    <div class="error-message">{{ workspace.errorMessage() }}</div>
  </div>
}

<div class="app-shell" [class.handbook-shell]="isHandbookRoute()">
  <router-outlet />
</div>

@if (workspace.isLoading()) {
  <div class="loader">
    <div class="loader-content">
      <div class="spinner"></div>
      <div>Processing files...</div>
    </div>
  </div>
}
