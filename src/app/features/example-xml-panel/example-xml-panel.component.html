<section class="example-panel">
  <div
    class="example-panel-header"
    role="button"
    tabindex="0"
    [attr.aria-expanded]="!isCollapsed()"
    (click)="toggleCollapsed()"
    (keydown.enter)="toggleCollapsed()"
    (keydown.space)="toggleCollapsed(); $event.preventDefault()"
  >
    <div>
      <div class="example-panel-title">Example XML Generator</div>
      <div class="example-panel-subtitle">
        Generate a minimal sample instance document from the loaded schema.
      </div>
    </div>

    <div class="example-panel-controls" (click)="$event.stopPropagation()">
      <select
        #rootSelect
        class="example-select"
        [value]="selectedRoot"
        (change)="onRootChange(rootSelect.value)"
      >
        @if (rootOptions.length === 0) {
          <option value="">Choose root element</option>
        } @else {
          @for (option of rootOptions; track option.value) {
            <option [value]="option.value">{{ option.label }}</option>
          }
        }
      </select>

      <button class="control-btn" type="button" (click)="copyXml()">Copy XML</button>
    </div>
  </div>

  <div class="example-panel-body" [class.collapsed]="isCollapsed()">
    <div class="example-panel-body-inner">
      <div class="comment-options">
        <div class="comment-options-sidebar">
          <div class="comment-options-label">
            Comment annotations
          </div>

          <div class="comment-option-actions">
            <button class="comment-option-action" type="button" (click)="setAllCommentOptions(true)">
              Select all
            </button>
            <button class="comment-option-action" type="button" (click)="setAllCommentOptions(false)">
              Clear
            </button>
          </div>
        </div>

        <div class="comment-option-groups">
          @for (group of commentOptionGroups; track group.title) {
            <section class="comment-option-group">
              <div class="comment-option-group-title">{{ group.title }}</div>

              <div class="comment-option-list">
                @for (option of group.options; track option.key) {
                  <label class="comment-option">
                    <input
                      #commentCheckbox
                      type="checkbox"
                      [checked]="commentOptions[option.key]"
                      (change)="onCommentOptionChange(option.key, commentCheckbox.checked)"
                    />
                    <span>{{ option.label }}</span>
                  </label>
                }
              </div>
            </section>
          }
        </div>
      </div>

      <pre class="example-output"><code class="language-markup" [innerHTML]="(exampleXml || emptyState) | prismHighlight"></code></pre>
    </div>
  </div>
</section>
